<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTR Transaction Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--border:#252933;
  --text:#e2e4ea;--text2:#8b8f9e;--accent:#3b82f6;
  --buy:#22c55e;--buy-bg:rgba(34,197,94,.08);--buy-border:rgba(34,197,94,.2);
  --sell:#ef4444;--sell-bg:rgba(239,68,68,.08);--sell-border:rgba(239,68,68,.2);
  --gold:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:999}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#fff;letter-spacing:-0.5px}
.logo h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.logo p{font-size:13px;color:var(--text2);margin-top:2px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--buy);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-right{display:flex;align-items:center;gap:12px}
#refreshBtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
#refreshBtn:hover{border-color:var(--accent);color:var(--accent)}

.status-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;margin-bottom:20px;font-size:13px;color:var(--text2);display:none}
.status-bar.error{border-color:var(--sell-border);color:var(--sell)}
.status-bar.ok{border-color:var(--buy-border);color:var(--buy)}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.stat .value.buy{color:var(--buy)}.stat .value.sell{color:var(--sell)}.stat .value.gold{color:var(--gold)}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.filters button.active,.filters button:hover{border-color:var(--accent);color:var(--text);background:rgba(59,130,246,.1)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{background:var(--surface2);padding:12px 16px;text-align:left;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.type-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.type-badge.buy{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border)}
.type-badge.sell{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border)}
.mono{font-family:'JetBrains Mono',monospace;font-size:13px}
.addr{color:var(--accent);text-decoration:none;transition:opacity .15s}
.addr:hover{opacity:.7}
.time{color:var(--text2);font-size:13px}
.tx-link{color:var(--text2);text-decoration:none;font-size:13px;transition:color .15s}
.tx-link:hover{color:var(--accent)}

.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.page-nav{display:flex;justify-content:center;gap:8px;margin-top:16px}
.page-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px}
.page-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.page-nav button:disabled{opacity:.3;cursor:default}

.debug-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-top:20px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text2);max-height:200px;overflow:auto;display:none}

@media(max-width:768px){
  th:nth-child(5),td:nth-child(5){display:none}
  .container{padding:16px 12px}
  .stat .value{font-size:16px}
}
@media(max-width:520px){
  th:nth-child(4),td:nth-child(4){display:none}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-mark">CTR</div>
      <div>
        <h1>CTR Tracker</h1>
        <p><span class="live-dot"></span>Cronos EVM Transaction Feed</p>
      </div>
    </div>
    <div class="header-right">
      <span id="lastUpdate" style="font-size:12px;color:var(--text2)"></span>
      <button id="refreshBtn" onclick="loadTxs()">&#8635; Refresh</button>
    </div>
  </header>

  <div class="status-bar" id="statusBar"></div>

  <div class="stats" id="stats">
    <div class="stat"><div class="label">Total Transactions</div><div class="value gold" id="statTotal">...</div></div>
    <div class="stat"><div class="label">Buys</div><div class="value buy" id="statBuys">...</div></div>
    <div class="stat"><div class="label">Sells</div><div class="value sell" id="statSells">...</div></div>
    <div class="stat"><div class="label">Buy Volume (CTR)</div><div class="value buy" id="statBuyVol">...</div></div>
    <div class="stat"><div class="label">Sell Volume (CTR)</div><div class="value sell" id="statSellVol">...</div></div>
  </div>

  <div class="filters">
    <button class="active" onclick="setFilter('all',this)">All</button>
    <button onclick="setFilter('buy',this)">Buys</button>
    <button onclick="setFilter('sell',this)">Sells</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Amount (CTR)</th>
          <th>Wallet</th>
          <th>Tx Hash</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="txBody">
        <tr><td colspan="5" class="loading"><div class="spinner"></div>Fetching transactions from Cronos...</td></tr>
      </tbody>
    </table>
  </div>
  <div class="page-nav" id="pageNav" style="display:none">
    <button id="prevBtn" onclick="changePage(-1)" disabled>&laquo; Prev</button>
    <span id="pageInfo" style="padding:6px 10px;color:var(--text2);font-size:13px"></span>
    <button id="nextBtn" onclick="changePage(1)">Next &raquo;</button>
  </div>

  <div class="debug-panel" id="debugPanel"></div>
</div>

<script>
const CTR_ADDR = '0xF3672F0cF2E45B28AC4a1D50FD8aC2eB555c21FC';
const LP_ADDR  = '0xF118aA245B0627b4752607620D0048B492A5f4FB';
const LP_LC = LP_ADDR.toLowerCase();
const DECIMALS = 18;
const PER_PAGE = 25;
const EXPLORER = 'https://explorer.cronos.org';
const API_KEY = 'JhU1OvkEIUYYcBCnlfahIcPeu6DIGt7k';

let allTxs = [];
let filtered = [];
let currentFilter = 'all';
let page = 0;
let debugLog = [];

function log(msg) {
  debugLog.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
  const panel = document.getElementById('debugPanel');
  panel.textContent = debugLog.join('\n');
}

function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar ' + (type || '');
  bar.style.display = 'block';
}

// API strategy 1: Cronos Explorer API (etherscan-compatible path-based)
async function fetchCronosExplorer() {
  const url = `https://explorer-api.cronos.org/mainnet/api/v1/account/tokentx?contractaddress=${CTR_ADDR}&address=${LP_ADDR}&page=1&offset=500&sort=desc&apikey=${API_KEY}`;
  log('Trying Cronos Explorer API (path-based)...');
  const resp = await fetch(url);
  const data = await resp.json();
  log(`Response status field: ${data.status}, result count: ${Array.isArray(data.result) ? data.result.length : 'N/A'}`);
  if (data.status === '1' && Array.isArray(data.result) && data.result.length > 0) return data.result;
  // Some APIs return result without status
  if (Array.isArray(data.result) && data.result.length > 0) return data.result;
  return null;
}

// API strategy 2: Cronos Explorer API (etherscan-compatible query param style)
async function fetchCronosExplorerQP() {
  const url = `https://explorer-api.cronos.org/mainnet/api/v1?module=account&action=tokentx&contractaddress=${CTR_ADDR}&address=${LP_ADDR}&page=1&offset=500&sort=desc&apikey=${API_KEY}`;
  log('Trying Cronos Explorer API (query-param)...');
  const resp = await fetch(url);
  const data = await resp.json();
  log(`Response status field: ${data.status}, result count: ${Array.isArray(data.result) ? data.result.length : 'N/A'}`);
  if (data.status === '1' && Array.isArray(data.result) && data.result.length > 0) return data.result;
  if (Array.isArray(data.result) && data.result.length > 0) return data.result;
  return null;
}

// API strategy 3: BlockScout at cronos.org/explorer/api
async function fetchBlockScout() {
  const url = `https://cronos.org/explorer/api?module=account&action=tokentx&contractaddress=${CTR_ADDR}&address=${LP_ADDR}&page=1&offset=500&sort=desc`;
  log('Trying BlockScout API...');
  const resp = await fetch(url);
  const data = await resp.json();
  log(`Response status field: ${data.status}, result count: ${Array.isArray(data.result) ? data.result.length : 'N/A'}`);
  if (data.status === '1' && Array.isArray(data.result) && data.result.length > 0) return data.result;
  return null;
}

function normalizeTx(tx) {
  return {
    from: (tx.from || '').toLowerCase(),
    to: (tx.to || '').toLowerCase(),
    value: tx.value || '0',
    hash: tx.hash || tx.transactionHash || '',
    timestamp: parseInt(tx.timeStamp || tx.timestamp || tx.block_timestamp || 0)
  };
}

async function loadTxs() {
  const tbody = document.getElementById('txBody');
  tbody.innerHTML = '<tr><td colspan="5" class="loading"><div class="spinner"></div>Fetching transactions from Cronos...</td></tr>';
  debugLog = [];

  let rawTxs = null;
  let source = '';

  // Try each API strategy
  const strategies = [
    { fn: fetchCronosExplorer, name: 'Cronos Explorer (path)' },
    { fn: fetchCronosExplorerQP, name: 'Cronos Explorer (QP)' },
    { fn: fetchBlockScout, name: 'BlockScout' }
  ];

  for (const s of strategies) {
    try {
      rawTxs = await s.fn();
      if (rawTxs) { source = s.name; break; }
    } catch(e) {
      log(`${s.name} failed: ${e.message}`);
    }
  }

  if (!rawTxs) {
    showStatus('Could not fetch data from any Cronos API. Check the debug panel below for details.', 'error');
    document.getElementById('debugPanel').style.display = 'block';
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Failed to fetch data. Toggle debug panel for details.</td></tr>';
    return;
  }

  showStatus(`Connected via ${source} (${rawTxs.length} transfers loaded)`, 'ok');
  log(`Success via ${source}: ${rawTxs.length} transfers`);

  allTxs = rawTxs.map(raw => {
    const tx = normalizeTx(raw);
    // Timestamp: if it looks like seconds (< 2e10), multiply by 1000
    let ts = tx.timestamp;
    if (ts && ts < 2e10) ts *= 1000;

    const fromLP = tx.from === LP_LC;
    const toLP   = tx.to === LP_LC;
    let type, wallet;
    if (fromLP && !toLP) { type = 'buy'; wallet = tx.to; }
    else if (toLP && !fromLP) { type = 'sell'; wallet = tx.from; }
    else return null;

    // Parse value: could be decimal string or wei
    let amount;
    const val = tx.value;
    if (val.includes('.')) {
      amount = parseFloat(val);
    } else {
      amount = parseFloat(val) / (10 ** DECIMALS);
    }
    if (isNaN(amount)) amount = 0;

    return { type, amount, wallet, hash: tx.hash, timestamp: ts };
  }).filter(Boolean);

  applyFilter();
  renderStats();
  document.getElementById('pageNav').style.display = 'flex';
  document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
}

function renderStats() {
  const buys = allTxs.filter(t => t.type === 'buy');
  const sells = allTxs.filter(t => t.type === 'sell');
  document.getElementById('statTotal').textContent = allTxs.length;
  document.getElementById('statBuys').textContent = buys.length;
  document.getElementById('statSells').textContent = sells.length;
  document.getElementById('statBuyVol').textContent = formatNum(buys.reduce((s,t) => s + t.amount, 0));
  document.getElementById('statSellVol').textContent = formatNum(sells.reduce((s,t) => s + t.amount, 0));
}

function setFilter(f, btn) {
  currentFilter = f;
  page = 0;
  document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  applyFilter();
}

function applyFilter() {
  filtered = currentFilter === 'all' ? allTxs : allTxs.filter(t => t.type === currentFilter);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('txBody');
  const start = page * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));

  if (!slice.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No transactions found.</td></tr>';
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    document.getElementById('pageInfo').textContent = '0 / 0';
    return;
  }

  tbody.innerHTML = slice.map(tx => `
    <tr>
      <td><span class="type-badge ${tx.type}">${tx.type}</span></td>
      <td class="mono">${formatNum(tx.amount)}</td>
      <td><a class="addr mono" href="${EXPLORER}/address/${tx.wallet}" target="_blank" rel="noopener">${shortAddr(tx.wallet)}</a></td>
      <td><a class="tx-link mono" href="${EXPLORER}/tx/${tx.hash}" target="_blank" rel="noopener">${shortAddr(tx.hash)}</a></td>
      <td class="time">${timeAgo(tx.timestamp)}</td>
    </tr>
  `).join('');

  document.getElementById('prevBtn').disabled = page === 0;
  document.getElementById('nextBtn').disabled = page >= totalPages - 1;
  document.getElementById('pageInfo').textContent = `${page + 1} / ${totalPages}`;
}

function changePage(d) { page += d; renderTable(); }
function shortAddr(a) { if (!a) return ''; return a.slice(0, 6) + '...' + a.slice(-4); }

function formatNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(2) + 'K';
  return n.toFixed(2);
}

function timeAgo(ts) {
  if (!ts || isNaN(ts)) return 'N/A';
  const diff = (Date.now() - ts) / 1000;
  if (diff < 0) return 'just now';
  if (diff < 60) return Math.floor(diff) + 's ago';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  const d = Math.floor(diff / 86400);
  if (d < 30) return d + 'd ago';
  return new Date(ts).toLocaleDateString();
}

// Toggle debug
document.addEventListener('keydown', e => {
  if (e.key === 'd' && e.altKey) {
    const p = document.getElementById('debugPanel');
    p.style.display = p.style.display === 'none' ? 'block' : 'none';
  }
});

// Start
loadTxs();
setInterval(loadTxs, 60000);
</script>
</body>
</html>
