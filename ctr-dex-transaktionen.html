<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTR DEX Transaktions-Tracker</title>
<link rel="icon" type="image/png" href="ctr-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--bg2:#111827;--bd:#1e2d4a;--tx:#e8e6f0;--mut:#94a3b8;--gold:#d4a843;--green:#4ade80;--red:#ef4444;--acc:#64ffda}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--tx);font-family:Inter,sans-serif}
.container{max-width:1200px;margin:0 auto;padding:24px}
.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;align-items:center}
.logo{display:flex;gap:10px;align-items:center}.logo img{width:38px;height:38px;border-radius:50%}
.logo h1{margin:0;font:800 28px Manrope,sans-serif}.logo span{font:500 12px 'DM Mono',monospace;color:var(--gold)}
.btn{padding:10px 14px;border:1px solid var(--bd);border-radius:10px;color:var(--tx);text-decoration:none;background:var(--bg2);font-size:13px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:16px}
.card .l{font:500 10px 'DM Mono',monospace;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
.card .v{font:800 28px Manrope,sans-serif;margin-top:8px}
.ok{color:var(--green)}.bad{color:var(--red)}
.panel{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;overflow:hidden}
.panel-h{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:14px 16px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.meta{font:500 11px 'DM Mono',monospace;color:var(--mut)}
input,select{background:#0f172a;border:1px solid var(--bd);color:var(--tx);padding:8px 10px;border-radius:8px;font:500 12px 'DM Mono',monospace}
.controls{display:flex;gap:8px;flex-wrap:wrap}
.table-wrap{overflow:auto;max-height:70vh}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;border-bottom:1px solid rgba(30,45,74,.5);text-align:left;font-size:12px;white-space:nowrap}
th{position:sticky;top:0;background:#131b2b;font:500 10px 'DM Mono',monospace;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
a{color:var(--acc);text-decoration:none}
.badge{font:700 10px 'DM Mono',monospace;padding:3px 8px;border-radius:6px;display:inline-block}
.buy{color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
.sell{color:var(--red);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}
.small{font:500 11px 'DM Mono',monospace;color:var(--mut)}
@media (max-width:900px){.cards{grid-template-columns:repeat(2,1fr)}}
@media (max-width:580px){.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <div class="top">
    <div class="logo"><img src="ctr-logo.png" alt="CTR"><div><h1>CTR DEX Tracker</h1><span>ALLE Buy/Sell Transaktionen am LP</span></div></div>
    <a class="btn" href="index.html">← Zurück zur Season Seite</a>
  </div>

  <div class="cards">
    <div class="card"><div class="l">Gesamt Trades</div><div class="v" id="cTotal">0</div></div>
    <div class="card"><div class="l">Buys</div><div class="v ok" id="cBuy">0</div></div>
    <div class="card"><div class="l">Sells</div><div class="v bad" id="cSell">0</div></div>
    <div class="card"><div class="l">Geschätztes Volumen</div><div class="v" id="cVol">$0</div></div>
  </div>

  <div class="panel">
    <div class="panel-h">
      <div>
        <div><strong>Live Feed aller CTR DEX Trades</strong></div>
        <div class="meta" id="status">Initialisiere …</div>
      </div>
      <div class="controls">
        <select id="typeFilter"><option value="all">Alle Typen</option><option value="buy">Nur Buys</option><option value="sell">Nur Sells</option></select>
        <input id="walletFilter" placeholder="Wallet enthält … (0x...)" />
        <button class="btn" id="refreshBtn">Neu laden</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Zeit (UTC)</th><th>Typ</th><th>Wallet</th><th>CTR</th><th>USD</th><th>Tx Hash</th></tr></thead>
        <tbody id="rows"><tr><td colspan="6" class="small">Lade Transaktionen …</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CTR='0xF3672F0cF2E45B28AC4a1D50FD8aC2eB555c21FC'.toLowerCase();
const LP='0xf118aa245b0627b4752607620d0048b492a5f4fb'.toLowerCase();
const DEC=18;
const API_KEY='ckey_951452f88ecf7e';
let allTrades=[];
let ctrPrice=0;

const el=id=>document.getElementById(id);
const status=(t)=>el('status').textContent=t;
const short=(a)=>a?`${a.slice(0,6)}...${a.slice(-4)}`:'-';
const fmtNum=(n,d=2)=>Number(n||0).toLocaleString('de-DE',{maximumFractionDigits:d});
const fmtUsd=(n)=>'$'+Number(n||0).toLocaleString('de-DE',{maximumFractionDigits:2});

async function jfetch(url, timeout=20000){
  const c=new AbortController();
  const t=setTimeout(()=>c.abort(),timeout);
  try{const r=await fetch(url,{signal:c.signal});if(!r.ok)throw new Error('HTTP '+r.status);return await r.json();}
  finally{clearTimeout(t);}
}

async function fetchPrice(){
  try{
    const d=await jfetch(`https://api.dexscreener.com/latest/dex/pairs/cronos/${LP}`);
    ctrPrice=parseFloat(d?.pair?.priceUsd||'0')||0;
  }catch(e){ctrPrice=0;}
}

async function fetchAllTransfers(){
  const endpoints=[
    p=>`https://explorer-api.cronos.org/mainnet/api/v1/account/tokentx?contractaddress=${CTR}&address=${LP}&page=${p}&offset=5000&sort=desc&apikey=${API_KEY}`,
    p=>`https://cronos.org/explorer/api?module=account&action=tokentx&contractaddress=${CTR}&address=${LP}&page=${p}&offset=5000&sort=desc`
  ];

  for(const makeUrl of endpoints){
    const out=[];
    let page=1;
    try{
      while(page<=20){
        status(`Lade Seite ${page} … (${out.length} gefunden)`);
        const d=await jfetch(makeUrl(page));
        const batch=Array.isArray(d?.result)?d.result:[];
        if(!batch.length) break;
        out.push(...batch);
        if(batch.length<5000) break;
        page++;
      }
      if(out.length) return out;
    }catch(e){/* fallback */}
  }
  return [];
}

function normalize(tx){
  const from=(tx.from||'').toLowerCase();
  const to=(tx.to||'').toLowerCase();
  const isBuy=from===LP&&to!==LP;
  const isSell=to===LP&&from!==LP;
  if(!isBuy&&!isSell) return null;

  const wallet=isBuy?to:from;
  let ctr=0;
  try{ctr=Number(BigInt(tx.value||'0'))/Math.pow(10,parseInt(tx.tokenDecimal||DEC));}
  catch(e){ctr=parseFloat(tx.value||'0')/Math.pow(10,DEC);}
  const ts=parseInt(tx.timeStamp||'0')*1000;
  const hash=(tx.hash||tx.transactionHash||'').toLowerCase();

  return {type:isBuy?'buy':'sell',wallet,ctr,usd:ctr*ctrPrice,ts,hash};
}

function applyFilters(){
  const type=el('typeFilter').value;
  const walletNeed=el('walletFilter').value.trim().toLowerCase();
  let rows=allTrades.slice();
  if(type!=='all') rows=rows.filter(r=>r.type===type);
  if(walletNeed) rows=rows.filter(r=>r.wallet.includes(walletNeed));
  render(rows);
}

function render(rows){
  el('cTotal').textContent=fmtNum(rows.length,0);
  el('cBuy').textContent=fmtNum(rows.filter(r=>r.type==='buy').length,0);
  el('cSell').textContent=fmtNum(rows.filter(r=>r.type==='sell').length,0);
  const vol=rows.reduce((a,b)=>a+(b.usd||0),0);
  el('cVol').textContent=fmtUsd(vol);

  const body=el('rows');
  if(!rows.length){body.innerHTML='<tr><td colspan="6" class="small">Keine Treffer.</td></tr>';return;}
  body.innerHTML=rows.slice(0,3000).map(r=>`<tr>
    <td>${new Date(r.ts).toISOString().replace('T',' ').slice(0,19)}</td>
    <td><span class="badge ${r.type}">${r.type.toUpperCase()}</span></td>
    <td><a href="https://cronoscan.com/address/${r.wallet}" target="_blank">${short(r.wallet)}</a></td>
    <td>${fmtNum(r.ctr,2)}</td>
    <td>${fmtUsd(r.usd)}</td>
    <td><a href="https://cronoscan.com/tx/${r.hash}" target="_blank">${short(r.hash)}</a></td>
  </tr>`).join('');
}

async function loadAll(){
  status('Starte Abruf …');
  await fetchPrice();
  const raw=await fetchAllTransfers();
  allTrades=raw.map(normalize).filter(Boolean).sort((a,b)=>b.ts-a.ts);
  status(`Aktualisiert: ${new Date().toISOString().replace('T',' ').slice(0,19)} UTC · ${allTrades.length} Trades`);
  applyFilters();
}

el('typeFilter').addEventListener('change',applyFilters);
el('walletFilter').addEventListener('input',applyFilters);
el('refreshBtn').addEventListener('click',loadAll);
loadAll();
setInterval(loadAll,30000);
</script>
</body>
</html>
