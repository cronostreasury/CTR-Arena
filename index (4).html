<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTR Transaction Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0b0f;--surface:#12141a;--surface2:#1a1d26;--border:#252933;
  --text:#e2e4ea;--text2:#8b8f9e;--accent:#3b82f6;
  --buy:#22c55e;--buy-bg:rgba(34,197,94,.08);--buy-border:rgba(34,197,94,.2);
  --sell:#ef4444;--sell-bg:rgba(239,68,68,.08);--sell-border:rgba(239,68,68,.2);
  --gold:#f59e0b;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:999}
.container{max-width:1200px;margin:0 auto;padding:24px 20px}
header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:14px}
.logo-mark{width:42px;height:42px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b5cf6);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;color:#fff;letter-spacing:-0.5px}
.logo h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.logo p{font-size:13px;color:var(--text2);margin-top:2px}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--buy);display:inline-block;margin-right:6px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.header-right{display:flex;align-items:center;gap:12px}
#refreshBtn{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 16px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
#refreshBtn:hover{border-color:var(--accent);color:var(--accent)}
.api-setup{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.api-setup label{font-size:13px;color:var(--text2);white-space:nowrap}
.api-setup input{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:13px;outline:none;transition:border-color .15s}
.api-setup input:focus{border-color:var(--accent)}
.api-setup button{background:var(--accent);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;transition:opacity .15s}
.api-setup button:hover{opacity:.85}

.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px}
.stat .label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat .value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700}
.stat .value.buy{color:var(--buy)}.stat .value.sell{color:var(--sell)}.stat .value.gold{color:var(--gold)}

.filters{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filters button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 16px;border-radius:20px;cursor:pointer;font-family:inherit;font-size:13px;transition:all .15s}
.filters button.active,.filters button:hover{border-color:var(--accent);color:var(--text);background:rgba(59,130,246,.1)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead{position:sticky;top:0;z-index:2}
th{background:var(--surface2);padding:12px 16px;text-align:left;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600;border-bottom:1px solid var(--border)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.type-badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.type-badge.buy{background:var(--buy-bg);color:var(--buy);border:1px solid var(--buy-border)}
.type-badge.sell{background:var(--sell-bg);color:var(--sell);border:1px solid var(--sell-border)}
.mono{font-family:'JetBrains Mono',monospace;font-size:13px}
.addr{color:var(--accent);text-decoration:none;transition:opacity .15s}
.addr:hover{opacity:.7}
.time{color:var(--text2);font-size:13px}
.tx-link{color:var(--text2);text-decoration:none;font-size:13px;transition:color .15s}
.tx-link:hover{color:var(--accent)}

.loading{text-align:center;padding:60px 20px;color:var(--text2)}
.loading .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.page-nav{display:flex;justify-content:center;gap:8px;margin-top:16px}
.page-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px}
.page-nav button:hover:not(:disabled){border-color:var(--accent);color:var(--text)}
.page-nav button:disabled{opacity:.3;cursor:default}

@media(max-width:768px){
  th:nth-child(5),td:nth-child(5){display:none}
  .container{padding:16px 12px}
  .stat .value{font-size:16px}
}
@media(max-width:520px){
  th:nth-child(4),td:nth-child(4){display:none}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="container">
  <header>
    <div class="logo">
      <div class="logo-mark">CTR</div>
      <div>
        <h1>CTR Tracker</h1>
        <p><span class="live-dot"></span>Cronos EVM Transaction Feed</p>
      </div>
    </div>
    <div class="header-right">
      <span id="lastUpdate" style="font-size:12px;color:var(--text2)"></span>
      <button id="refreshBtn" onclick="loadTxs()">&#8635; Refresh</button>
    </div>
  </header>

  <div class="api-setup" id="apiSetup">
    <label>CronoScan API Key:</label>
    <input type="password" id="apiKeyInput" placeholder="Paste your API key..." value="">
    <button onclick="saveKeyAndLoad()">Connect</button>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="label">Total Transactions</div><div class="value gold" id="statTotal">0</div></div>
    <div class="stat"><div class="label">Buys</div><div class="value buy" id="statBuys">0</div></div>
    <div class="stat"><div class="label">Sells</div><div class="value sell" id="statSells">0</div></div>
    <div class="stat"><div class="label">Buy Volume (CTR)</div><div class="value buy" id="statBuyVol">0</div></div>
    <div class="stat"><div class="label">Sell Volume (CTR)</div><div class="value sell" id="statSellVol">0</div></div>
  </div>

  <div class="filters" id="filterBar" style="display:none">
    <button class="active" onclick="setFilter('all',this)">All</button>
    <button onclick="setFilter('buy',this)">Buys</button>
    <button onclick="setFilter('sell',this)">Sells</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Amount (CTR)</th>
          <th>Wallet</th>
          <th>Tx Hash</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody id="txBody">
        <tr><td colspan="5" class="empty">Enter your CronoScan API key to start tracking.</td></tr>
      </tbody>
    </table>
  </div>
  <div class="page-nav" id="pageNav" style="display:none">
    <button id="prevBtn" onclick="changePage(-1)" disabled>&laquo; Prev</button>
    <span id="pageInfo" style="padding:6px 10px;color:var(--text2);font-size:13px"></span>
    <button id="nextBtn" onclick="changePage(1)">Next &raquo;</button>
  </div>
</div>

<script>
const CTR = '0xF3672F0cF2E45B28AC4a1D50FD8aC2eB555c21FC'.toLowerCase();
const LP  = '0xF118aA245B0627b4752607620D0048B492A5f4FB'.toLowerCase();
const DECIMALS = 18;
const PER_PAGE = 25;
const EXPLORER = 'https://cronoscan.com';

let allTxs = [];
let filtered = [];
let currentFilter = 'all';
let page = 0;
let apiKey = '';

// Persist key in localStorage
(function init(){
  const saved = localStorage.getItem('ctr_tracker_apikey');
  if(saved){
    apiKey = saved;
    document.getElementById('apiKeyInput').value = saved;
    loadTxs();
  }
})();

function saveKeyAndLoad(){
  apiKey = document.getElementById('apiKeyInput').value.trim();
  if(!apiKey) return;
  localStorage.setItem('ctr_tracker_apikey', apiKey);
  loadTxs();
}

async function loadTxs(){
  if(!apiKey) return;
  const tbody = document.getElementById('txBody');
  tbody.innerHTML = '<tr><td colspan="5" class="loading"><div class="spinner"></div>Fetching transactions from Cronos...</td></tr>';
  document.getElementById('apiSetup').style.display = 'none';

  try {
    // Fetch CTR token transfers involving the LP pair
    const url = `https://api.cronoscan.com/api?module=account&action=tokentx&contractaddress=${CTR}&address=${LP}&page=1&offset=500&sort=desc&apikey=${apiKey}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if(data.status !== '1' || !data.result || !Array.isArray(data.result)){
      tbody.innerHTML = `<tr><td colspan="5" class="empty">API returned no results. Message: ${data.message || 'unknown'}</td></tr>`;
      return;
    }

    allTxs = data.result.map(tx => {
      const fromLP = tx.from.toLowerCase() === LP;
      const toLP   = tx.to.toLowerCase() === LP;
      let type = 'unknown';
      let wallet = '';
      if(fromLP && !toLP){ type = 'buy'; wallet = tx.to; }
      else if(toLP && !fromLP){ type = 'sell'; wallet = tx.from; }
      else { return null; }

      const amount = parseFloat(tx.value) / (10 ** DECIMALS);
      return {
        type,
        amount,
        wallet,
        hash: tx.hash,
        timestamp: parseInt(tx.timeStamp) * 1000
      };
    }).filter(Boolean);

    applyFilter();
    renderStats();
    document.getElementById('stats').style.display = 'grid';
    document.getElementById('filterBar').style.display = 'flex';
    document.getElementById('pageNav').style.display = 'flex';
    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();

  } catch(err){
    tbody.innerHTML = `<tr><td colspan="5" class="empty">Error: ${err.message}</td></tr>`;
  }
}

function renderStats(){
  const buys = allTxs.filter(t=>t.type==='buy');
  const sells = allTxs.filter(t=>t.type==='sell');
  document.getElementById('statTotal').textContent = allTxs.length;
  document.getElementById('statBuys').textContent = buys.length;
  document.getElementById('statSells').textContent = sells.length;
  document.getElementById('statBuyVol').textContent = formatNum(buys.reduce((s,t)=>s+t.amount,0));
  document.getElementById('statSellVol').textContent = formatNum(sells.reduce((s,t)=>s+t.amount,0));
}

function setFilter(f, btn){
  currentFilter = f;
  page = 0;
  document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  applyFilter();
}

function applyFilter(){
  filtered = currentFilter === 'all' ? allTxs : allTxs.filter(t=>t.type===currentFilter);
  renderTable();
}

function renderTable(){
  const tbody = document.getElementById('txBody');
  const start = page * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);

  if(!slice.length){
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No transactions found.</td></tr>';
    return;
  }

  tbody.innerHTML = slice.map(tx => `
    <tr>
      <td><span class="type-badge ${tx.type}">${tx.type}</span></td>
      <td class="mono">${formatNum(tx.amount)}</td>
      <td><a class="addr mono" href="${EXPLORER}/address/${tx.wallet}" target="_blank" rel="noopener">${shortAddr(tx.wallet)}</a></td>
      <td><a class="tx-link mono" href="${EXPLORER}/tx/${tx.hash}" target="_blank" rel="noopener">${shortAddr(tx.hash)}</a></td>
      <td class="time">${timeAgo(tx.timestamp)}</td>
    </tr>
  `).join('');

  document.getElementById('prevBtn').disabled = page === 0;
  document.getElementById('nextBtn').disabled = page >= totalPages - 1;
  document.getElementById('pageInfo').textContent = `${page+1} / ${totalPages}`;
}

function changePage(d){ page += d; renderTable(); }

function shortAddr(a){ return a.slice(0,6) + '...' + a.slice(-4); }

function formatNum(n){
  if(n >= 1e6) return (n/1e6).toFixed(2) + 'M';
  if(n >= 1e3) return (n/1e3).toFixed(2) + 'K';
  return n.toFixed(2);
}

function timeAgo(ts){
  const diff = (Date.now() - ts) / 1000;
  if(diff < 60) return Math.floor(diff) + 's ago';
  if(diff < 3600) return Math.floor(diff/60) + 'm ago';
  if(diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

// Auto-refresh every 60s
setInterval(()=>{ if(apiKey) loadTxs(); }, 60000);
</script>
</body>
</html>
