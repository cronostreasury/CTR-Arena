name: Build Season Snapshot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/build-snapshot.js'
      - 'scripts/build-claims.js'
      - '.github/workflows/snapshot.yml'

permissions:
  contents: write

concurrency:
  group: snapshot
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install --no-save ethers @openzeppelin/merkle-tree

      - name: Build snapshot (chain → season.json)
        run: node scripts/build-snapshot.js

      - name: Build claims merkle tree (season.json → claims.json)
        run: node scripts/build-claims.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/season.json data/trades.json data/claims.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "snapshot: $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
